<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קולקציות | מ.י.ה BY MAYA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:       #2d1b0e;
      --stone-dark:  #4a3020;
      --stone-mid:   #8c7055;
      --stone-light: #c8b49a;
      --stone-pale:  #f4ede0;
      --white:       #fdf8f0;
      --gold:        #b8935a;
      --font-serif: 'Bodoni Moda', Georgia, serif;
      --font-sans:  'Assistant', Arial, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--white); color: var(--black); direction: rtl; text-align: right; line-height: 1.6; }

    /* ─── HEADER ─── */
    .announcement-bar { background: var(--black); color: var(--stone-pale); text-align: center; font-size: 13px; letter-spacing: 0.08em; padding: 10px 20px; font-weight: 300; }
    header { position: sticky; top: 0; z-index: 50; background: var(--white); border-bottom: 1px solid var(--stone-light); padding: 0 40px; }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .logo-block { display: flex; align-items: center; text-decoration: none; }
    .logo-block img { height: 56px; width: auto; }
    .btn-whatsapp { display: flex; align-items: center; gap: 8px; background: var(--black); color: var(--white); text-decoration: none; padding: 10px 20px; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; border-radius: 2px; transition: background 0.2s; }
    .btn-whatsapp:hover { background: var(--stone-dark); }

    /* ─── PAGE HEADER ─── */
    .page-header { background: var(--stone-pale); border-bottom: 1px solid var(--stone-light); padding: 56px 40px 48px; text-align: center; }
    .breadcrumb { font-size: 13px; color: var(--stone-mid); margin-bottom: 16px; }
    .breadcrumb a { color: var(--stone-mid); text-decoration: none; }
    .breadcrumb a:hover { color: var(--black); }
    .page-title { font-family: var(--font-serif); font-size: clamp(26px, 4vw, 44px); font-weight: 500; color: var(--black); margin-bottom: 10px; }
    .page-subtitle { font-size: 15px; color: var(--stone-mid); font-weight: 300; max-width: 480px; margin: 0 auto; line-height: 1.65; }

    /* ─── COLLECTION BADGE ─── */
    .collection-badge {
      display: inline-block;
      margin: 24px auto 0;
      background: var(--black);
      color: var(--stone-pale);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 2px;
    }

    /* ─── PRODUCTS GRID ─── */
    .products-section { max-width: 1280px; margin: 0 auto; padding: 64px 40px; }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .product-card {
      cursor: pointer;
      background: none;
      border: none;
      text-align: right;
      padding: 0;
      font-family: var(--font-sans);
      color: var(--black);
    }
    .product-image-wrap {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--stone-pale);
      margin-bottom: 14px;
      border-radius: 2px;
    }
    .product-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
      display: block;
    }
    .product-card:hover .product-image-wrap img { transform: scale(1.04); }

    .product-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      color: var(--stone-mid);
      background: linear-gradient(160deg, var(--stone-pale), #e8ddd0);
    }
    .product-placeholder svg { opacity: 0.4; }
    .product-placeholder span { font-size: 12px; letter-spacing: 0.08em; opacity: 0.6; }

    .product-quick {
      position: absolute; bottom: 14px; left: 0; right: 0;
      display: flex; justify-content: center;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
    }
    .product-card:hover .product-quick { opacity: 1; transform: translateY(0); }
    .product-quick span {
      background: var(--white); color: var(--black);
      padding: 9px 24px; font-size: 13px; font-weight: 500;
      border-radius: 1px; box-shadow: 0 4px 20px rgba(0,0,0,0.14);
      pointer-events: none;
    }

    .product-name {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 500; color: var(--black);
      margin-bottom: 6px; line-height: 1.35;
    }
    .product-price {
      font-size: 14px; color: var(--stone-dark); font-weight: 400;
    }
    .product-price-note { font-size: 12px; color: var(--stone-mid); margin-top: 2px; }

    /* ─── PRODUCT MODAL ─── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(45,27,14,0.75);
      align-items: center; justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 4px;
      max-width: 900px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
    }

    .modal-close {
      position: absolute; top: 16px; left: 16px;
      background: none; border: none;
      font-size: 24px; cursor: pointer;
      color: var(--stone-mid); padding: 6px;
      line-height: 1; transition: color 0.2s; z-index: 10;
    }
    .modal-close:hover { color: var(--black); }

    /* Image slider side */
    .modal-slider {
      position: relative;
      aspect-ratio: 3/4;
      background: var(--stone-pale);
      overflow: hidden;
    }
    .slider-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.25s;
    }
    .slider-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      color: var(--stone-mid);
      background: linear-gradient(160deg, var(--stone-pale), #e8ddd0);
    }
    .slider-placeholder p { font-size: 14px; color: var(--stone-mid); font-weight: 300; text-align: center; padding: 0 24px; }

    .slider-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(253,248,240,0.9); border: none;
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; color: var(--black);
      transition: background 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .slider-btn:hover { background: var(--white); transform: translateY(-50%) scale(1.08); }
    .slider-prev { right: 12px; }
    .slider-next { left: 12px; }
    .slider-btn.hidden { display: none; }

    .slider-dots {
      position: absolute; bottom: 12px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 6px;
    }
    .slider-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(253,248,240,0.6); border: none; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .slider-dot.active { background: var(--white); transform: scale(1.2); }

    /* Info side */
    .modal-info {
      padding: 40px 32px 32px;
      display: flex; flex-direction: column;
      gap: 0;
    }
    .modal-collection-label {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .modal-product-name {
      font-family: var(--font-serif);
      font-size: clamp(18px, 2.5vw, 24px);
      font-weight: 500; color: var(--black);
      line-height: 1.3; margin-bottom: 8px;
    }
    .modal-product-subtitle {
      font-size: 14px; color: var(--stone-mid);
      font-weight: 300; margin-bottom: 28px; line-height: 1.6;
    }

    .price-section {
      border-top: 1px solid var(--stone-light);
      padding-top: 20px; margin-bottom: 20px;
    }
    .price-section-title {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--stone-mid); margin-bottom: 12px;
    }
    .price-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--stone-pale);
      font-size: 14px;
    }
    .price-row:last-child { border-bottom: none; }
    .price-row-label { color: var(--stone-dark); font-weight: 400; }
    .price-row-val { color: var(--black); font-weight: 600; direction: ltr; }
    .price-base-row { background: var(--stone-pale); margin: 0 -4px; padding: 9px 4px; border-radius: 2px; }
    .price-base-row .price-row-label { font-weight: 600; }

    .modal-note {
      font-size: 12px; color: var(--stone-mid); font-weight: 300;
      margin-bottom: 24px; line-height: 1.6;
    }

    .btn-wa-order {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #25D366; color: var(--white);
      text-decoration: none; padding: 14px 24px;
      font-size: 15px; font-weight: 600; letter-spacing: 0.03em;
      border-radius: 3px; transition: background 0.2s, transform 0.15s;
      margin-top: auto;
    }
    .btn-wa-order:hover { background: #1fba5a; transform: translateY(-1px); }

    .slider-counter {
      position: absolute; bottom: 32px; right: 12px;
      font-size: 11px; color: rgba(253,248,240,0.7);
      font-family: var(--font-sans); display: none;
    }

    /* ─── BOTTOM ACTIONS ─── */
    .bottom-actions {
      text-align: center; padding: 0 40px 80px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--stone-mid);
      border: 1px solid var(--stone-light);
      padding: 12px 28px; font-size: 14px; font-weight: 500;
      font-family: var(--font-sans);
      letter-spacing: 0.04em; border-radius: 2px;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-back:hover { color: var(--black); border-color: var(--black); }

    /* ─── WHATSAPP FLOAT ─── */
    .wa-float { position: fixed; bottom: 28px; left: 28px; width: 56px; height: 56px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(37,211,102,0.4); z-index: 100; text-decoration: none; transition: transform 0.2s; }
    .wa-float:hover { transform: scale(1.08); }

    /* ─── FOOTER ─── */
    footer { background: var(--black); color: var(--stone-pale); padding: 40px; text-align: center; font-size: 13px; color: var(--stone-mid); }
    footer a { color: var(--stone-mid); text-decoration: none; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .page-header { padding: 40px 24px 32px; }
      .products-section { padding: 40px 16px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
      .bottom-actions { padding: 0 24px 56px; }

      .modal { grid-template-columns: 1fr; max-height: 95vh; }
      .modal-slider { aspect-ratio: 4/3; }
      .modal-info { padding: 24px 20px 20px; }
      .modal-close { top: 10px; left: 10px; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    }

    /* ─── FADE IN ─── */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>

let currentCollection = null;
let sliderImages = [];
let sliderIndex = 0;

function init() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('collection') || 'boutique';
  currentCollection = collections[key] || collections.boutique;

  document.title = currentCollection.name + ' | מ.י.ה BY MAYA';
  document.getElementById('breadcrumb-name').textContent = currentCollection.name;
  document.getElementById('page-title').textContent = currentCollection.name;
  document.getElementById('page-subtitle').textContent = currentCollection.subtitle;
  const badgeEl = document.getElementById('collection-badge');
  if (currentCollection.badge) {
    badgeEl.textContent = currentCollection.badge;
  } else {
    badgeEl.style.display = 'none';
  }

  const grid = document.getElementById('products-grid');
  currentCollection.products.forEach((p, i) => {
    const card = document.createElement('button');
    card.className = 'product-card fade-in';
    card.setAttribute('aria-label', p.name);

    const coverImg = p.images.length
      ? `<img src="images/${encodeURIComponent(p.folder)}/${p.images[0]}" alt="${p.name}" loading="lazy" />`
      : `<div class="product-placeholder">
           <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
           <span>תמונות בקרוב</span>
         </div>`;

    card.innerHTML = `
      <div class="product-image-wrap">
        ${coverImg}
        <div class="product-quick"><span>לפרטים ומחירים</span></div>
      </div>
      <p class="product-name">${p.name}</p>
      <p class="product-price">מחיר בסיס: ₪${p.basePrice}</p>
      <p class="product-price-note">+ תוספות אופציונליות</p>
    `;
    card.addEventListener('click', () => openModal(i));
    grid.appendChild(card);
  });

  const observer = new IntersectionObserver(
    entries => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } }),
    { threshold: 0.1 }
  );
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

function openModal(productIndex) {
  const p = currentCollection.products[productIndex];
  sliderImages = p.images.length
    ? p.images.map(img => 'images/' + encodeURIComponent(p.folder) + '/' + img)
    : [];
  sliderIndex = 0;

  document.getElementById('modal-collection-label').textContent = currentCollection.badge;
  document.getElementById('modal-product-name').textContent = p.name;
  document.getElementById('modal-product-subtitle').textContent = p.subtitle;

  // Prices
  const priceRows = document.getElementById('price-rows');
  priceRows.innerHTML = `
    <div class="price-row price-base-row">
      <span class="price-row-label">מחיר בסיס</span>
      <span class="price-row-val">₪${p.basePrice} ליחידה</span>
    </div>
    ${p.extras.map(e => `
      <div class="price-row">
        <span class="price-row-label">תוספת ${e.name}</span>
        <span class="price-row-val">+ ₪${e.price}</span>
      </div>
    `).join('')}
  `;

  // WhatsApp link
  const msg = encodeURIComponent(`שלום מיה! אני מעוניין/ת לשמוע פרטים על: ${p.name} (${currentCollection.name})`);
  document.getElementById('btn-wa').href = `https://wa.me/${PHONE}?text=${msg}`;

  // Slider
  const sliderEl = document.getElementById('modal-slider');
  const imgEl = document.getElementById('slider-img');

  if (sliderImages.length === 0) {
    sliderEl.innerHTML = `
      <div class="slider-placeholder">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <p>תמונות המוצר יתווספו בקרוב</p>
      </div>
    `;
  } else {
    sliderEl.innerHTML = `
      <img class="slider-img" id="slider-img" src="${sliderImages[0]}" alt="${p.name}" />
      <button class="slider-btn slider-prev${sliderImages.length <= 1 ? ' hidden' : ''}" onclick="sliderNav(-1)" aria-label="הקודם">&#8250;</button>
      <button class="slider-btn slider-next${sliderImages.length <= 1 ? ' hidden' : ''}" onclick="sliderNav(1)" aria-label="הבא">&#8249;</button>
      <div class="slider-dots" id="slider-dots"></div>
    `;
    buildDots();
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function buildDots() {
  const dots = document.getElementById('slider-dots');
  if (!dots || sliderImages.length <= 1) return;
  dots.innerHTML = sliderImages.map((_, i) =>
    `<button class="slider-dot${i === sliderIndex ? ' active' : ''}" onclick="goToSlide(${i})" aria-label="תמונה ${i+1}"></button>`
  ).join('');
}

function goToSlide(i) {
  sliderIndex = i;
  const img = document.getElementById('slider-img');
  if (img) { img.style.opacity = 0; setTimeout(() => { img.src = sliderImages[i]; img.style.opacity = 1; }, 150); }
  buildDots();
}

function sliderNav(dir) {
  if (!sliderImages.length) return;
  sliderIndex = (sliderIndex + dir + sliderImages.length) % sliderImages.length;
  goToSlide(sliderIndex);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modal-overlay').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowRight') sliderNav(-1);
  if (e.key === 'ArrowLeft') sliderNav(1);
});

init();
</script>
