<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>גלריה | מ.י.ה BY MAYA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,400&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #111110; --stone-dark: #2a2925; --stone-mid: #6b6860;
      --stone-light: #c8c4bc; --stone-pale: #f0ede8; --white: #faf9f7;
      --gold: #b8a98c;
      --font-serif: 'Bodoni Moda', Georgia, serif;
      --font-sans: 'Assistant', Arial, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); background: var(--white); color: var(--black); direction: rtl; text-align: right; line-height: 1.6; }

    /* Header */
    .announcement-bar { background: var(--black); color: var(--stone-pale); text-align: center; font-size: 13px; letter-spacing: 0.08em; padding: 10px 20px; font-weight: 300; }
    header { position: sticky; top: 0; z-index: 50; background: var(--white); border-bottom: 1px solid var(--stone-light); padding: 0 40px; }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .logo-block { display: flex; align-items: center; text-decoration: none; }
    .logo-block img { height: 56px; width: auto; }
    .btn-whatsapp { display: flex; align-items: center; gap: 8px; background: var(--black); color: var(--white); text-decoration: none; padding: 10px 20px; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; border-radius: 2px; transition: background 0.2s; cursor: pointer; }
    .btn-whatsapp:hover { background: var(--stone-dark); }

    /* Page header */
    .page-header {
      background: var(--stone-pale);
      border-bottom: 1px solid var(--stone-light);
      padding: 56px 40px 48px;
      text-align: center;
    }
    .breadcrumb { font-size: 13px; color: var(--stone-mid); margin-bottom: 16px; }
    .breadcrumb a { color: var(--stone-mid); text-decoration: none; }
    .breadcrumb a:hover { color: var(--black); }
    .page-title { font-family: var(--font-serif); font-size: clamp(28px, 4vw, 48px); font-weight: 500; color: var(--black); margin-bottom: 12px; }
    .page-subtitle { font-size: 15px; color: var(--stone-mid); font-weight: 300; }

    /* Gallery grid */
    .gallery-section { max-width: 1280px; margin: 0 auto; padding: 64px 40px; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .gallery-item {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      background: var(--stone-pale);
      border-radius: 2px;
      cursor: pointer;
    }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
      display: block;
    }
    .gallery-item:hover img { transform: scale(1.04); }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.93);
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .lightbox.open { display: flex; }
    .lightbox-img {
      max-width: 90vw; max-height: 90vh;
      object-fit: contain;
      border-radius: 2px;
    }
    .lightbox-close {
      position: fixed; top: 20px; left: 20px;
      background: none; border: none; color: white;
      font-size: 32px; cursor: pointer; padding: 8px;
      line-height: 1;
      opacity: 0.8; transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }
    .lightbox-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.12); border: none; color: white;
      font-size: 28px; cursor: pointer; padding: 16px 12px;
      border-radius: 2px; transition: background 0.2s;
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.22); }
    .lightbox-prev { right: 20px; }
    .lightbox-next { left: 20px; }
    .lightbox-counter {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 13px; font-family: var(--font-sans);
    }

    /* Back & CTA */
    .bottom-actions {
      text-align: center;
      padding: 0 40px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--stone-mid);
      border: 1px solid var(--stone-light);
      padding: 12px 28px; font-size: 14px; font-weight: 500;
      font-family: var(--font-sans);
      letter-spacing: 0.04em; border-radius: 2px;
      text-decoration: none; transition: all 0.2s; cursor: pointer;
    }
    .btn-back:hover { color: var(--black); border-color: var(--black); }
    .btn-primary {
      background: var(--black); color: var(--white);
      padding: 14px 36px; font-size: 14px; font-weight: 500;
      letter-spacing: 0.06em; text-decoration: none; border-radius: 2px;
      transition: background 0.2s; display: inline-block;
    }
    .btn-primary:hover { background: var(--stone-dark); }

    /* WhatsApp float */
    .wa-float { position: fixed; bottom: 28px; left: 28px; width: 56px; height: 56px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(37,211,102,0.4); z-index: 100; text-decoration: none; transition: transform 0.2s; }
    .wa-float:hover { transform: scale(1.08); }

    /* Footer */
    footer { background: var(--black); color: var(--stone-pale); padding: 40px; text-align: center; font-size: 13px; color: var(--stone-mid); }
    footer a { color: var(--stone-mid); text-decoration: none; }

    /* Responsive */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .page-header { padding: 40px 24px 32px; }
      .gallery-section { padding: 40px 16px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .bottom-actions { padding: 0 24px 56px; }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Fade in */
    .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<script>
  const products = {
    "ברכות השחר": {
      subtitle: "ברכונים לחינה ומקווה",
      images: ["IMG_6666.jpg","IMG_6667.jpg","IMG_6668.jpg","IMG_6673.jpg","IMG_6674.jpg","IMG_6685.jpg","IMG_6686.jpg"]
    },
    "הבדלה - דגם ניסים": {
      subtitle: "ברכון הבדלה בעיצוב אישי",
      images: ["IMG_6633.jpg","IMG_6638.jpg","IMG_6639.jpg","IMG_6642.jpg","IMG_6644.jpg","IMG_6652.jpg","IMG_6654.jpg","IMG_6661.jpg"]
    },
    "נועם - הפרשת חלה": {
      subtitle: "ספרון הפרשת חלה – קולקציית נועם",
      images: ["IMG_6843.jpg","IMG_6844.jpg","IMG_6845.jpg","IMG_6846.jpg","IMG_6855.jpg","IMG_6857.jpg"]
    },
    "נועם - מזמור לתודה": {
      subtitle: "ספרון מזמור לתודה – קולקציית נועם",
      images: ["IMG_6863.jpg","IMG_6864.jpg","IMG_6868.jpg","IMG_6878.jpg","IMG_6880.jpg","IMG_6922.jpg","IMG_6923.jpg"]
    },
    "נועם - נשמת כל חי": {
      subtitle: "ספרון נשמת כל חי – קולקציית נועם",
      images: ["IMG_6893.jpg","IMG_6894.jpg","IMG_6911.jpg","IMG_6912.jpg","IMG_6913.jpg","IMG_6914.jpg","IMG_6915.jpg","IMG_6916.jpg"]
    },
    "סדר הדלקת נרות - דגם בר": {
      subtitle: "ברכון הדלקת נרות בעיצוב אישי",
      images: ["IMG_6942.jpg","IMG_6943.jpg","IMG_6944.jpg","IMG_6949.jpg","IMG_6952.jpg","IMG_6955.jpg"]
    },
    "סדר הפרשת חלה - דגם שאנל": {
      subtitle: "ספרון הפרשת חלה – דגם שאנל",
      images: ["IMG_6799.jpg","IMG_6804.jpg","IMG_6805.jpg","IMG_6816.jpg","IMG_6817.jpg","IMG_6819.jpg","IMG_6829.jpg","IMG_6833.jpg"]
    },
    "תמונות כללי": {
      subtitle: "גלריה כללית של המוצרים",
      images: ["IMG_0078.jpg","IMG_0083.jpg","IMG_0087.jpg"]
    }
  };

  let currentImages = [];
  let currentIndex = 0;

  function init() {
    // Support both ?product= and #productName
    const params = new URLSearchParams(window.location.search);
    const productName = params.get('product') || decodeURIComponent(window.location.hash.slice(1));
    const product = products[productName];

    if (!product) {
      document.getElementById('page-title').textContent = 'מוצר לא נמצא';
      return;
    }

    document.title = productName + ' | מ.י.ה BY MAYA';
    document.getElementById('breadcrumb-name').textContent = productName;
    document.getElementById('page-title').textContent = productName;
    document.getElementById('page-subtitle').textContent = product.subtitle;

    currentImages = product.images.map(img => 'images/' + encodeURIComponent(productName) + '/' + img);

    const grid = document.getElementById('gallery-grid');
    product.images.forEach((img, i) => {
      const item = document.createElement('div');
      item.className = 'gallery-item fade-in';
      item.innerHTML = '<img src="images/' + encodeURIComponent(productName) + '/' + img + '" alt="' + productName + ' - ' + (i+1) + '" loading="lazy" />';
      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
    });

    // Fade in observer
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  }

  function openLightbox(index) {
    currentIndex = index;
    document.getElementById('lightbox-img').src = currentImages[index];
    document.getElementById('lightbox-counter').textContent = (index + 1) + ' / ' + currentImages.length;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) {
      closeLightboxBtn();
    }
  }

  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navLightbox(dir) {
    currentIndex = (currentIndex - dir + currentImages.length) % currentImages.length;
    document.getElementById('lightbox-img').src = currentImages[currentIndex];
    document.getElementById('lightbox-counter').textContent = (currentIndex + 1) + ' / ' + currentImages.length;
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightboxBtn();
    if (e.key === 'ArrowRight') navLightbox(1);
    if (e.key === 'ArrowLeft') navLightbox(-1);
  });

  init();
</script>
</body>
